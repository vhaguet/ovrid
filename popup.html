<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <title>Ovrid</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <header>
    <div class="header-left">
      <svg class="logo" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/>
      </svg>
      <h1>Ovrid</h1>
    </div>
    <div class="header-right">
      <button id="btn-settings" class="btn-icon" title="Paramètres">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
        </svg>
      </button>
      <button id="btn-reset" class="btn-reset" title="Réinitialiser tous les overrides">Reset all</button>
    </div>
  </header>

  <div id="status-bar" class="status-bar hidden">
    <span class="dot"></span>
    <span id="status-text"></span>
  </div>

  <div id="reload-bar" class="reload-bar hidden">
    <span id="reload-text">Rechargez pour appliquer les overrides</span>
    <button id="btn-reload">⟳ Recharger</button>
  </div>

  <div id="search-bar" class="search-bar hidden">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="11" cy="11" r="7"/><path d="m21 21-4.35-4.35"/>
    </svg>
    <input id="search-input" type="search" placeholder="Rechercher…" autocomplete="off" spellcheck="false">
  </div>

  <main id="main-content">
    <div class="empty-state">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
      </svg>
      <p>Aucun feature flag détecté.</p>
      <p class="hint">Naviguez sur une page qui appelle l'API feature flags, puis rouvrez l'extension.</p>
    </div>
  </main>

  <div id="settings-panel" class="settings-panel hidden"></div>

  <script src="config.js"></script>
  <script src="popup.js"></script>
</body>
</html>
